apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp
  labels:
    type: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      type: frontend
  template:
    metadata:
      labels:
        type: frontend
    spec:
      containers:
      - name: mynginx
        image: nginx:1.28
        ports:
        - containerPort: 80